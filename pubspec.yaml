name: water_monitoring_mobile
description: "A new Flutter project for Water Monitoring GIS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  dotted_border: ^2.0.0
  
  # Logic & Data
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  connectivity_plus: ^6.0.0

  # Device Features (Location, Camera, Gallery)
  geolocator: ^10.1.0
  image_picker: ^1.0.4
  permission_handler: ^11.3.1 # Tambahkan ini untuk handle izin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Generator Icons & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: null

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 
  adaptive_icon_background: "#FFFFFF" # Warna background putih di belakang logo
  adaptive_icon_foreground: "assets/images/icon.png"
  adaptive_icon_background_color: "#FFFFFF"
  image_path_android: "assets/images/icon.png"
  adaptive_icon_foreground_inset: 16

